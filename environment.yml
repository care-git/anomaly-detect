# environment.yml

name: anomaly-detect
channels:
  - rapidsai      # required for cuml (GPU acceleration, Linux + CUDA only)
  - conda-forge
  - defaults

dependencies:
  # Base Python
  - python>=3.10

  # Core ML stack
  - numpy=2.4.4
  - pandas=3.0.2
  - scikit-learn=1.8.0
  - tensorflow=2.21.0
  - joblib=1.5.3

  # Packet analysis
  - scapy=2.7.0

  # Visualisation
  - matplotlib=3.10.9
  - seaborn=0.13.2

  # Utilities
  - pyyaml=6.0.3
  - tqdm=4.67.3

  # GPU acceleration (optional — Linux + CUDA only, not available on macOS)
  # Remove or comment out on machines without an NVIDIA GPU.
  # Pairs with use_gpu: true in config/config.yml.
  # - cuml

  # Build tooling
  - pip
  - pip:
    - setuptools-scm