# === Capture Settings ===
capture:
  interface: en0
  duration: 30
  packet_count: 100
  output_path: data/captures/capture.pcap

# === Preprocessing Settings ===
preprocessing:
  batch_size: 1000
  label: Null
  pcap_input: data/captures/capture.pcap
  csv_output: data/processed/preprocessed.csv

# === Dataset Utils Settings ===
dataset_utils:
  output_path: data/combined/combined.csv

# === Training Settings ===
training:
  input: data/processed/preprocessed.csv
  save_dir: data/models/
  model_type: autoencoder
  n_estimators: 100

  # Autoencoder hyperparameters
  ae_epochs: 100
  ae_patience: 5
  ae_batch_size: 32

  # SVM backend — 'linear' uses LinearSVC (faster, O(n) training time) or
  # any sklearn SVC kernel string e.g. 'rbf', 'poly' (O(n²), more expressive)
  svm_kernel: rbf

# === Detection Settings ===
detection:
  input_path: data/captures/capture.pcap
  model_type: autoencoder
  model_path: data/models/autoencoder/autoencoder_model
  csv_output: data/detection/detection.csv
  threshold: 0.5

# === SIEM / Wazuh Integration ===
siem:
  mode: file    # Options: file, syslog, both
  log_path: data/logs/alerts.log
  log_max_bytes: 10485760   # 10 MB per file
  log_backup_count: 5       # keep 5 rotated files
  syslog_host: 127.0.0.1
  syslog_port: 514
