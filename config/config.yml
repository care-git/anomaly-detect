# config/config.yml

# === Capture Settings ===
capture:
  # Network interface to capture on. This is platform-specific:
  #   macOS:   en0 (Wi-Fi), en1 (Ethernet)
  #   Linux:   eth0, ens3, wlan0 (run 'ip link' to list interfaces)
  #   Windows: "Wi-Fi", "Ethernet" (run 'getmac /v' or check Device Manager)
  #            Requires Npcap to be installed: https://npcap.com
  interface: eth0
  duration: 30
  packet_count: 100
  output_path: data/captures/capture.pcap

# === Preprocessing Settings ===
preprocessing:
  batch_size: 1000
  label: Null
  pcap_input: data/captures/capture.pcap
  csv_output: data/processed/preprocessed.csv

# === Dataset Utils Settings ===
dataset_utils:
  output_path: data/combined/combined.csv

# === Training Settings ===
training:
  input: data/processed/preprocessed.csv
  save_dir: data/models/
  model_type: autoencoder

  # Autoencoder hyperparameters
  ae_epochs: 100
  ae_patience: 5
  ae_batch_size: 32

  # Percentile of normal-traffic training MSE used to set the anomaly threshold.
  # Lower values = more false positives; higher = more false negatives.
  ae_threshold_percentile: 95
  
  # When using a labelled dataset, the autoencoder trains on normal-only
  # rows by default (label == 0). Set to true to include anomalous rows.
  ae_train_on_anomalous: false

  # Random Forest hyperparameter
  n_estimators: 100

  # SVM hyperperameters
  # backend - 'linear' uses LinearSVC (faster, O(n) training time) or
  # any sklearn SVC kernel string: 'rbf', 'poly', sigmoid (O(n²), more expressive)
  # 'poly' and 'sigmoid' are not compatible with GPU acceleration.
  svm_kernel: linear
  svm_max_iter: 2000

  # GPU acceleration - requires RAPIDS cuML 
  # When true and cuML is present, RF and SVM use GPU-accelerated backends.
  # Falls back to sklearn silently if cuML is not installed.
  use_gpu: false

# === Detection Settings ===
detection:
  input_path: data/captures/capture.pcap
  model_type: autoencoder
  model_path: data/models/autoencoder/autoencoder_model
  csv_output: data/detection/detection.csv
  threshold: 0.5

# === SIEM / Wazuh Integration ===
siem:
  mode: file    # Options: file, syslog, both
  log_path: data/logs/alerts.log
  log_max_bytes: 10485760   # size per file, 10 MB default
  log_backup_count: 5       # number of rotated files
  syslog_host: 127.0.0.1
  syslog_port: 514
